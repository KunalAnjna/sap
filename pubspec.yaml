name: staff_attendance_pro
description: Staff Attendance & Payroll Management with Face Attendance & GPS Tracking
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  provider: ^6.1.1

  # Local DB
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2
  uuid: ^4.3.3
  intl: ^0.19.0
  shared_preferences: ^2.2.2

  # Camera & Face
  camera: ^0.10.5+9
  image_picker: ^1.0.7

  # Location & Maps
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.5.3
  permission_handler: ^11.2.0

  # UI
  table_calendar: ^3.0.9
  fl_chart: ^0.66.0

  # PDF
  pdf: ^3.10.7
  printing: ^5.12.0

  # Connectivity
  connectivity_plus: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
